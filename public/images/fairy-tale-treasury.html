<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Fairy Tale Treasury — by Rayene Medabis</title>
<meta name="description" content="30 classic fairy tales retold simply for young readers, by Rayene Medabis.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --lavender:#EDE1FB;
  --blush:#FFE6F2;
  --ink:#4A3F5C;
  --ink-soft:#8B7EA8;
  --paper:#FFFDFB;
  --gold:#FFD873;
  --shadow-sm:0 6px 18px rgba(90,70,130,.14);
  --shadow-md:0 14px 34px rgba(90,70,130,.20);
  --shadow-lg:0 26px 60px rgba(70,55,110,.32);
  --r-lg:30px;
  --r-md:20px;
  --f-display:'Fredoka',sans-serif;
  --f-body:'Nunito',sans-serif;
  --story-c1:#EDE1FB;
  --story-c2:#B79FD4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:var(--f-body);
  color:var(--ink);
  min-height:100vh;
  background:
    radial-gradient(ellipse 900px 500px at 15% -5%, #FFF7E0 0%, transparent 60%),
    radial-gradient(ellipse 900px 600px at 90% 8%, var(--blush) 0%, transparent 55%),
    linear-gradient(160deg, var(--lavender) 0%, #EAF3FF 55%, #FFF3EA 100%);
  background-attachment:fixed;
  position:relative;
  overflow-x:hidden;
}
.hidden{display:none !important;}
button{font-family:inherit;}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:8px;}

/* decorative floating layer */
.floaties{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.floaty{position:absolute;width:34px;height:34px;opacity:.6;animation:bob 7s ease-in-out infinite;}
.floaty svg{width:100%;height:100%;display:block;}
@media (prefers-reduced-motion:reduce){.floaty{animation:none;}}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-22px) rotate(6deg);}}

/* ===== menu / shelf screen ===== */
#menu-screen{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:52px 20px 90px;}
.site-header{text-align:center;margin-bottom:8px;}
.eyebrow{font-family:var(--f-display);font-weight:500;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
.site-title{font-family:var(--f-display);font-weight:600;font-size:clamp(2.1rem,6vw,3.4rem);
  background:linear-gradient(90deg,#B384CF,#F0729C 45%,#4FA6DE);
  -webkit-background-clip:text;background-clip:text;color:transparent;margin:4px 0 10px;line-height:1.15;}
.site-subtitle{font-size:1.1rem;color:var(--ink-soft);}
.site-author{margin-top:12px;font-size:.95rem;color:var(--ink-soft);}
.site-author strong{color:var(--ink);}

.shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:26px 20px;margin-top:44px;}
.book-tile{
  --tilt:0deg;
  position:relative;background:linear-gradient(165deg, var(--c1) 0%, var(--paper) 145%);
  border:none;border-radius:var(--r-md);padding:18px 12px 16px;cursor:pointer;
  box-shadow:var(--shadow-sm);
  transform:rotate(var(--tilt));
  transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .28s ease;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  isolation:isolate;
}
.book-tile::after{
  content:"";position:absolute;top:0;right:14px;width:15px;height:24px;
  background:var(--c2);clip-path:polygon(0 0,100% 0,100% 100%,50% 76%,0 100%);
  box-shadow:0 3px 6px rgba(0,0,0,.10);
}
.book-tile:hover,.book-tile:focus-visible{transform:rotate(0deg) translateY(-8px) scale(1.045);box-shadow:var(--shadow-md);z-index:2;}
.tile-illus{width:92px;height:92px;}
.tile-title{font-family:var(--f-display);font-weight:600;font-size:.98rem;text-align:center;color:var(--ink);line-height:1.25;}
.tile-hint{font-size:.7rem;color:var(--ink-soft);}

.footer-credit{text-align:center;margin-top:70px;color:var(--ink-soft);font-size:.9rem;}

/* ===== book / reading screen ===== */
#book-screen{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:16px;
  background:
    radial-gradient(ellipse 900px 500px at 15% -5%, #FFF7E0 0%, transparent 60%),
    radial-gradient(ellipse 900px 600px at 90% 8%, var(--blush) 0%, transparent 55%),
    linear-gradient(160deg, var(--lavender) 0%, #EAF3FF 55%, #FFF3EA 100%);
}
.book-card{
  width:100%;max-width:700px;max-height:94vh;background:var(--paper);border-radius:34px;
  box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;
}
.book-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  background:linear-gradient(100deg,var(--story-c1),var(--story-c2));}
.book-story-title{font-family:var(--f-display);font-weight:600;color:var(--ink);font-size:1rem;}
.close-btn{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.8);
  font-size:1.05rem;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-sm);flex-shrink:0;}
.close-btn:hover{background:#fff;}

.page-stage{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:22px 30px 8px;text-align:center;gap:12px;min-height:280px;}
.page-stage svg.scene{width:min(200px,42vw);height:auto;flex-shrink:0;}
.page-eyebrow{font-family:var(--f-display);font-size:.76rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);}
.page-headline{font-family:var(--f-display);font-weight:600;font-size:clamp(1.5rem,4.2vw,2.1rem);color:var(--ink);}
.page-text{font-size:clamp(1.2rem,3.4vw,1.5rem);line-height:1.7;font-weight:800;color:var(--ink);max-width:32ch;}
.page-note{font-size:.95rem;color:var(--ink-soft);}

.book-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 20px 20px;}
.nav-btn{font-family:var(--f-display);font-weight:600;border:none;border-radius:999px;padding:13px 20px;
  font-size:.98rem;cursor:pointer;color:var(--ink);
  background:linear-gradient(120deg,var(--story-c2),var(--story-c1));
  box-shadow:var(--shadow-sm);transition:transform .15s ease;white-space:nowrap;}
.nav-btn:active{transform:scale(.94);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.page-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:120px;}
.dot{width:7px;height:7px;border-radius:50%;background:#E4D9F0;transition:all .2s;flex-shrink:0;}
.dot.active{background:var(--story-c2);width:18px;border-radius:5px;}

/* shared svg tone classes, used by symbol library */
.scene-bg{fill:var(--story-c1);opacity:.6;}
.tone-a{fill:var(--story-c2);}
.tone-b{fill:var(--story-c1);}
.tone-skin{fill:#FCD9B8;}
.tone-hair{fill:#8A5A3B;}
.tone-hairdark{fill:#3D3450;}
.tone-hairgold{fill:#E8C468;}
.tone-hairgray{fill:#C9C2D6;}
.tone-dark{fill:var(--ink);}
.tone-white{fill:#ffffff;}
.tone-gray{fill:#B7AFC9;}
.tone-brown{fill:#B08968;}
.tone-green{fill:#8FBF8F;}
.tone-red{fill:#E8748A;}
.tone-gold{fill:var(--gold);}
.tone-line{fill:none;stroke:var(--ink);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

@media (max-width:560px){
  .shelf{grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:16px 12px;}
  .tile-illus{width:70px;height:70px;}
  .tile-title{font-size:.85rem;}
  .page-stage svg.scene{width:54vw;}
  .book-card{border-radius:26px;}
  .nav-btn{padding:12px 16px;font-size:.9rem;}
}
</style>
</head>

<script>
const STORIES = [
{ title:"Cinderella", theme:["#EDE1FB","#B79FD4"], icon:[{s:'glass-slipper',x:100,y:112,w:110,h:100}],
  pages:[
    {text:"Cinderella lived with her mean stepmother and two stepsisters. They made her work all day.", actors:[{s:'girl-a',x:100,y:114,w:120,h:120}]},
    {text:"A fairy godmother appeared! She turned a pumpkin into a coach, and gave Cinderella a beautiful dress.", actors:[{s:'fairy',x:65,y:116,w:95,h:95},{s:'pumpkin-coach',x:145,y:118,w:100,h:100}]},
    {text:"Cinderella danced with the prince all night. At midnight, she ran home and lost one glass slipper.", actors:[{s:'prince',x:65,y:112,w:100,h:100},{s:'girl-a',x:140,y:112,w:100,h:100}]},
    {text:"The prince searched the kingdom. The slipper fit Cinderella perfectly, and they lived happily ever after.", actors:[{s:'castle',x:100,y:110,w:130,h:130},{s:'glass-slipper',x:150,y:150,w:55,h:55}]}
  ], moral:"Kindness always shines through." },
{ title:"Little Red Riding Hood", theme:["#FFE1EC","#F19CBB"], icon:[{s:'girl-hood',x:100,y:112,w:120,h:120}],
  pages:[
    {text:"Little Red Riding Hood took a basket to Grandma's house. She walked through the deep, dark woods.", actors:[{s:'girl-hood',x:75,y:114,w:105,h:105},{s:'tree-pine',x:150,y:100,w:85,h:110}]},
    {text:"A sneaky wolf ran ahead. He jumped into Grandma's bed and pretended to be her!", actors:[{s:'granny',x:65,y:114,w:95,h:95},{s:'wolf',x:140,y:116,w:100,h:100}]},
    {text:"\"What big teeth you have!\" said Little Red. \"All the better to eat you with!\" said the wolf.", actors:[{s:'girl-hood',x:70,y:114,w:95,h:95},{s:'wolf',x:140,y:114,w:100,h:100}]},
    {text:"A brave woodcutter heard her call and chased the wolf away. Grandma and Little Red were safe.", actors:[{s:'man-old',x:100,y:112,w:120,h:120}]}
  ], moral:"Always listen to good advice." },
{ title:"The Three Little Pigs", theme:["#DBF6EA","#7FCDA8"], icon:[{s:'pig',x:70,y:116,w:85,h:85},{s:'house-bricks',x:148,y:100,w:95,h:95}],
  pages:[
    {text:"Three little pigs built three houses: one of straw, one of sticks, and one of sturdy bricks.", actors:[{s:'house-straw',x:60,y:115,w:80,h:80},{s:'house-bricks',x:145,y:108,w:90,h:90}]},
    {text:"A big bad wolf huffed and puffed! He blew down the straw house and the stick house.", actors:[{s:'wolf',x:65,y:114,w:100,h:100},{s:'house-sticks',x:145,y:112,w:90,h:90}]},
    {text:"The two pigs ran to their brother's brick house. The wolf huffed and puffed, but the bricks stood strong.", actors:[{s:'pig',x:65,y:118,w:90,h:90},{s:'house-bricks',x:145,y:108,w:95,h:95}]},
    {text:"The wolf could not blow the house down. He ran away, and the three little pigs were safe and happy.", actors:[{s:'pig',x:70,y:116,w:90,h:90},{s:'pig',x:130,y:116,w:90,h:90}]}
  ], moral:"Hard work builds strong things." },
{ title:"Goldilocks and the Three Bears", theme:["#DCEEFC","#7EB8E8"], icon:[{s:'girl-a',x:68,y:114,w:95,h:95},{s:'bear',x:142,y:110,w:100,h:100}],
  pages:[
    {text:"Goldilocks found a little house in the woods. No one was home, so she peeked inside.", actors:[{s:'girl-a',x:70,y:114,w:100,h:100},{s:'cottage',x:145,y:105,w:95,h:95}]},
    {text:"She tasted three bowls of porridge. Papa's was too hot, Mama's was too cold, and Baby's was just right!", actors:[{s:'girl-a',x:100,y:114,w:115,h:115}]},
    {text:"She tried three chairs and three beds. Baby Bear's little bed was the comfiest of all.", actors:[{s:'girl-a',x:100,y:118,w:105,h:105}]},
    {text:"The three bears came home and found her! Goldilocks woke up and ran home very fast.", actors:[{s:'bear',x:65,y:112,w:100,h:100},{s:'bear',x:135,y:120,w:70,h:70}]}
  ], moral:"It's polite to ask before you visit." },
{ title:"Jack and the Beanstalk", theme:["#FFF3C9","#F3C94E"], icon:[{s:'beanstalk',x:100,y:100,w:110,h:150}],
  pages:[
    {text:"Jack traded his cow for five magic beans. His mother was upset and tossed them out the window.", actors:[{s:'boy-a',x:70,y:114,w:105,h:105},{s:'woman-old',x:145,y:112,w:100,h:100}]},
    {text:"The next morning, a giant beanstalk grew all the way to the sky! Jack climbed up to look.", actors:[{s:'beanstalk',x:100,y:100,w:120,h:160}]},
    {text:"At the top, Jack found a giant's castle with a bag of gold and a hen that laid golden eggs.", actors:[{s:'giant',x:70,y:112,w:110,h:110},{s:'castle',x:150,y:104,w:95,h:95}]},
    {text:"The giant chased Jack down the beanstalk. Jack chopped it down, and he and his mother lived happily.", actors:[{s:'boy-a',x:100,y:114,w:115,h:115}]}
  ], moral:"Being brave can lead to great things." },
{ title:"Hansel and Gretel", theme:["#FFE3D1","#F0996A"], icon:[{s:'boy-a',x:72,y:116,w:90,h:90},{s:'girl-a',x:132,y:116,w:90,h:90}],
  pages:[
    {text:"Hansel and Gretel got lost in the forest. Deep among the trees, they found a house made of candy!", actors:[{s:'boy-a',x:65,y:116,w:90,h:90},{s:'cottage',x:145,y:105,w:100,h:100}]},
    {text:"A witch lived in the candy house. She seemed friendly, but she really wanted to eat them up!", actors:[{s:'witch',x:100,y:114,w:115,h:115}]},
    {text:"The witch locked Hansel in a cage. But clever Gretel tricked the witch and pushed her away.", actors:[{s:'girl-a',x:70,y:114,w:100,h:100},{s:'witch',x:140,y:114,w:95,h:95}]},
    {text:"Hansel and Gretel ran home with treasure from the witch's house. Their family was overjoyed to see them.", actors:[{s:'boy-a',x:70,y:116,w:95,h:95},{s:'girl-a',x:132,y:116,w:95,h:95}]}
  ], moral:"Clever thinking gets you out of trouble." },
{ title:"Snow White", theme:["#E2E1FA","#9B9AE0"], icon:[{s:'girl-a',x:78,y:112,w:105,h:105},{s:'apple',x:150,y:92,w:45,h:45}],
  pages:[
    {text:"Snow White's stepmother, the Queen, was very jealous. She asked her magic mirror who was fairest of all.", actors:[{s:'queen',x:75,y:112,w:100,h:100},{s:'mirror-magic',x:150,y:105,w:80,h:80}]},
    {text:"The mirror said Snow White was fairest. So Snow White ran away and found seven kind little friends.", actors:[{s:'girl-a',x:100,y:114,w:115,h:115}]},
    {text:"The Queen tricked Snow White with a shiny red apple. Snow White took a bite and fell fast asleep.", actors:[{s:'girl-a',x:70,y:116,w:100,h:100},{s:'apple',x:145,y:98,w:60,h:60}]},
    {text:"A prince came by and gently woke her. Snow White opened her eyes, and everyone celebrated happily.", actors:[{s:'prince',x:68,y:112,w:100,h:100},{s:'girl-a',x:138,y:112,w:100,h:100}]}
  ], moral:"A kind heart is the fairest of all." },
{ title:"Rapunzel", theme:["#FFE1DC","#EF9284"], icon:[{s:'tower',x:100,y:100,w:110,h:150}],
  pages:[
    {text:"Rapunzel lived high in a tall tower with no doors or stairs. Her hair was very, very long.", actors:[{s:'tower',x:100,y:100,w:120,h:155}]},
    {text:"\"Rapunzel, Rapunzel, let down your hair!\" A witch used it like a rope to climb up and down.", actors:[{s:'witch',x:70,y:114,w:95,h:95},{s:'tower',x:150,y:100,w:90,h:120}]},
    {text:"One day, a prince heard Rapunzel singing sweetly. He climbed up her long hair to meet her.", actors:[{s:'prince',x:100,y:114,w:110,h:110}]},
    {text:"Rapunzel and the prince escaped the tower together, and lived happily ever after in the kingdom.", actors:[{s:'princess',x:70,y:112,w:100,h:100},{s:'prince',x:138,y:112,w:100,h:100}]}
  ], moral:"Love finds a way." },
{ title:"The Ugly Duckling", theme:["#F1E1FB","#BC85E8"], icon:[{s:'swan',x:100,y:114,w:120,h:120}],
  pages:[
    {text:"A little duckling looked different from his brothers and sisters. The other animals were not kind to him.", actors:[{s:'duck',x:100,y:116,w:105,h:105}]},
    {text:"He felt sad and lonely, so he swam far away. He spent a long, cold winter all alone.", actors:[{s:'duck',x:100,y:118,w:95,h:95}]},
    {text:"In spring, he saw beautiful swans on the lake. Shyly, he swam over to say hello.", actors:[{s:'duck',x:65,y:118,w:80,h:80},{s:'swan',x:140,y:112,w:100,h:100}]},
    {text:"He looked at his reflection in the water — he was a swan too, the most beautiful one of all!", actors:[{s:'swan',x:100,y:114,w:120,h:120}]}
  ], moral:"You are more wonderful than you know." },
{ title:"The Tortoise and the Hare", theme:["#D9F3ED","#78CDBC"], icon:[{s:'tortoise',x:68,y:120,w:75,h:75},{s:'hare',x:140,y:112,w:85,h:85}],
  pages:[
    {text:"A speedy hare laughed at a slow tortoise. \"Let's have a race!\" said the tortoise with a smile.", actors:[{s:'hare',x:70,y:112,w:100,h:100},{s:'tortoise',x:145,y:122,w:75,h:75}]},
    {text:"The race began! The hare zoomed far, far ahead, leaving the tortoise slowly plodding behind.", actors:[{s:'hare',x:100,y:112,w:115,h:115}]},
    {text:"The hare felt so sure he would win that he stopped to nap under a shady tree.", actors:[{s:'hare',x:70,y:120,w:90,h:90},{s:'tree-round',x:145,y:100,w:95,h:95}]},
    {text:"Slow and steady, the tortoise kept walking. He passed the sleeping hare and won the race!", actors:[{s:'tortoise',x:100,y:118,w:110,h:110}]}
  ], moral:"Slow and steady wins the race." },
{ title:"The Boy Who Cried Wolf", theme:["#FCE1EC","#E88AB0"], icon:[{s:'boy-a',x:75,y:112,w:95,h:95},{s:'wolf',x:140,y:116,w:90,h:90}],
  pages:[
    {text:"A shepherd boy watched sheep on a hill. One day, just for fun, he shouted, \"Wolf! Wolf!\"", actors:[{s:'boy-a',x:70,y:112,w:100,h:100},{s:'sheep',x:145,y:118,w:80,h:80}]},
    {text:"The villagers ran to help, but there was no wolf at all. The boy laughed and laughed.", actors:[{s:'boy-a',x:100,y:114,w:110,h:110}]},
    {text:"He cried \"Wolf!\" again the very next day. Again, the villagers came running for nothing.", actors:[{s:'boy-a',x:100,y:114,w:105,h:105}]},
    {text:"Then a real wolf came! The boy cried for help, but this time, no one believed him.", actors:[{s:'boy-a',x:70,y:114,w:95,h:95},{s:'wolf',x:140,y:116,w:100,h:100}]}
  ], moral:"Telling the truth matters." },
{ title:"Puss in Boots", theme:["#FFF3B8","#FFC94A"], icon:[{s:'cat',x:100,y:112,w:115,h:115}],
  pages:[
    {text:"A poor miller left his clever cat to his youngest son. The cat asked only for boots and a bag.", actors:[{s:'cat',x:100,y:114,w:115,h:115}]},
    {text:"Puss caught rabbits and brought them to the King, all as gifts from his clever 'master.'", actors:[{s:'cat',x:70,y:114,w:95,h:95},{s:'king',x:140,y:110,w:100,h:100}]},
    {text:"Puss tricked a scary ogre into turning into a tiny mouse, then gobbled him right up!", actors:[{s:'cat',x:70,y:116,w:95,h:95},{s:'troll',x:140,y:110,w:100,h:100}]},
    {text:"Puss gave his master the ogre's castle. The King was so impressed, they all lived happily ever after.", actors:[{s:'castle',x:100,y:106,w:120,h:120}]}
  ], moral:"Clever thinking can solve big problems." },
{ title:"The Frog Prince", theme:["#EDE1FB","#B79FD4"], icon:[{s:'frog',x:100,y:118,w:100,h:100}],
  pages:[
    {text:"A princess dropped her golden ball into a pond. A friendly frog offered to fetch it for her.", actors:[{s:'princess',x:70,y:112,w:100,h:100},{s:'frog',x:145,y:126,w:75,h:75}]},
    {text:"\"Let me be your friend,\" said the frog. The princess agreed, then quickly ran off with her ball.", actors:[{s:'frog',x:100,y:122,w:90,h:90}]},
    {text:"The frog followed her all the way to the castle. \"A promise is a promise,\" said the wise King.", actors:[{s:'frog',x:65,y:124,w:75,h:75},{s:'king',x:140,y:110,w:105,h:105}]},
    {text:"The princess kept her promise, and the frog turned into a handsome prince. They became the best of friends.", actors:[{s:'princess',x:70,y:112,w:100,h:100},{s:'prince',x:138,y:112,w:100,h:100}]}
  ], moral:"Always keep your promises." },
{ title:"Sleeping Beauty", theme:["#FFE1EC","#F19CBB"], icon:[{s:'princess',x:78,y:112,w:105,h:105},{s:'spinning-wheel',x:150,y:120,w:60,h:60}],
  pages:[
    {text:"A princess was born, and a mean fairy cast a spell: she would prick her finger and fall asleep.", actors:[{s:'witch',x:100,y:114,w:110,h:110}]},
    {text:"A kind fairy softened the spell. She would sleep for one hundred years instead, not forever.", actors:[{s:'fairy',x:100,y:114,w:105,h:105}]},
    {text:"On her birthday, the princess touched a spinning wheel and fell asleep. The whole castle slept too.", actors:[{s:'princess',x:68,y:114,w:95,h:95},{s:'spinning-wheel',x:145,y:122,w:70,h:70}]},
    {text:"One hundred years later, a kind prince arrived and gently woke her. The whole kingdom woke up too!", actors:[{s:'prince',x:70,y:112,w:100,h:100},{s:'princess',x:138,y:112,w:100,h:100}]}
  ], moral:"Kindness can soften even the worst luck." },
{ title:"Rumpelstiltskin", theme:["#DBF6EA","#7FCDA8"], icon:[{s:'elf',x:100,y:116,w:100,h:100},{s:'spinning-wheel',x:152,y:132,w:55,h:55}],
  pages:[
    {text:"A miller bragged that his daughter could spin straw into gold. The King locked her in a room to try.", actors:[{s:'girl-a',x:70,y:114,w:100,h:100},{s:'king',x:140,y:110,w:100,h:100}]},
    {text:"A funny little man appeared and spun the gold for her. But he wanted something in return.", actors:[{s:'elf',x:100,y:118,w:100,h:100}]},
    {text:"He asked for her firstborn child — unless she could guess his strange and tricky name.", actors:[{s:'elf',x:100,y:118,w:95,h:95}]},
    {text:"She guessed \"Rumpelstiltskin!\" He was so surprised, he stomped off and never came back again.", actors:[{s:'elf',x:100,y:116,w:105,h:105}]}
  ], moral:"Every name and every riddle can be solved." },
{ title:"The Little Mermaid", theme:["#DCEEFC","#7EB8E8"], icon:[{s:'mermaid',x:100,y:112,w:115,h:115}],
  pages:[
    {text:"A little mermaid loved watching the world above the sea. She dreamed of walking on land someday.", actors:[{s:'mermaid',x:100,y:112,w:120,h:120}]},
    {text:"She saved a prince from a shipwreck during a storm, and fell in love with him from afar.", actors:[{s:'mermaid',x:70,y:112,w:95,h:95},{s:'boat',x:145,y:112,w:100,h:100}]},
    {text:"A sea witch gave her legs to walk on land. It was hard work learning to walk on two feet!", actors:[{s:'mermaid',x:100,y:114,w:110,h:110}]},
    {text:"The mermaid made true friends on land and sea alike, and found joy wherever she went.", actors:[{s:'mermaid',x:70,y:112,w:95,h:95},{s:'prince',x:140,y:112,w:95,h:95}]}
  ], moral:"Being brave means trying new things." },
{ title:"Thumbelina", theme:["#FFF3C9","#F3C94E"], icon:[{s:'flower',x:100,y:104,w:105,h:105},{s:'girl-a',x:100,y:128,w:48,h:48}],
  pages:[
    {text:"A tiny woman, no bigger than a thumb, was born from a magic flower. They named her Thumbelina.", actors:[{s:'flower',x:100,y:110,w:120,h:120}]},
    {text:"A big bug, a mole, and a toad all wanted her to stay — but Thumbelina wanted to be free.", actors:[{s:'frog',x:70,y:120,w:80,h:80},{s:'girl-a',x:140,y:126,w:55,h:55}]},

const TILTS = [-3, 2, -1.5, 3, -2.5, 1.5, -1, 2.5];

function sceneSVG(actors, theme){
  const list = actors || [];
  const shapes = list.map(a=>{
    const w = a.w || 90, h = a.h || 90;
    const tx = a.x - w/2, ty = a.y - h/2;
    return '<use href="#sym-' + a.s + '" width="' + w + '" height="' + h + '" transform="translate(' + tx + ',' + ty + ')"/>';
  }).join('');
  return '<svg class="scene" viewBox="0 0 200 200" style="--story-c1:' + theme[0] + ';--story-c2:' + theme[1] + '">' +
    '<path class="scene-bg" d="M100 8C150 4 194 44 192 100C190 156 150 194 100 192C50 194 8 156 8 100C8 44 50 12 100 8Z"/>' +
    shapes + '</svg>';
}

function renderShelf(){
  const shelf = document.getElementById('shelf');
  shelf.innerHTML = STORIES.map((s,i)=>{
    return '<button class="book-tile" style="--c1:' + s.theme[0] + ';--c2:' + s.theme[1] + ';--tilt:' + TILTS[i % TILTS.length] + 'deg" data-i="' + i + '">' +
      '<div class="tile-illus">' + sceneSVG(s.icon, s.theme) + '</div>' +
      '<div class="tile-title">' + s.title + '</div>' +
      '<div class="tile-hint">Tap to read</div>' +
    '</button>';
  }).join('');
  shelf.querySelectorAll('.book-tile').forEach(function(btn){
    btn.addEventListener('click', function(){ openBook(parseInt(btn.dataset.i, 10)); });
  });
}

let current = null, page = 0, pages = [];

function buildPages(story){
  const cover = { kind:'cover', actors: story.icon };
  const end = { kind:'end', actors: story.icon.concat([
    {s:'sparkle', x:26, y:20, w:32, h:32},
    {s:'star', x:174, y:26, w:30, h:30}
  ])};
  return [cover].concat(story.pages).concat([end]);
}

function openBook(i){
  current = STORIES[i];
  page = 0;
  pages = buildPages(current);
  document.getElementById('book-story-title').textContent = current.title;
  document.getElementById('menu-screen').classList.add('hidden');
  const bs = document.getElementById('book-screen');
  bs.classList.remove('hidden');
  bs.style.setProperty('--story-c1', current.theme[0]);
  bs.style.setProperty('--story-c2', current.theme[1]);
  renderPage();
  bs.focus();
}

function closeBook(){
  document.getElementById('book-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
}

function renderPage(){
  const p = pages[page];
  const stage = document.getElementById('page-stage');
  const illus = sceneSVG(p.actors, current.theme);
  let body = '';
  if(p.kind === 'cover'){
    body = illus + '<p class="page-eyebrow">Once Upon A Time</p><h2 class="page-headline">' + current.title + '</h2><p class="page-note">Retold by Rayene Medabis</p>';
  } else if(p.kind === 'end'){
    body = illus + '<h2 class="page-headline">The End</h2><p class="page-note">✨ ' + current.moral + ' ✨</p>';
  } else {
    body = illus + '<p class="page-text">' + p.text + '</p>';
  }
  stage.innerHTML = body;
  document.getElementById('prev-page').disabled = (page === 0);
  const nextBtn = document.getElementById('next-page');
  nextBtn.textContent = (page === pages.length - 1) ? 'Back to Shelf ✓' : 'Next →';
  document.getElementById('page-dots').innerHTML = pages.map(function(_, idx){
    return '<span class="dot' + (idx === page ? ' active' : '') + '"></span>';
  }).join('');
  stage.scrollTop = 0;
}

function nextPage(){
  if(page === pages.length - 1){ closeBook(); return; }
  page++; renderPage();
}
function prevPage(){
  if(page === 0) return;
  page--; renderPage();
}

document.getElementById('next-page').addEventListener('click', nextPage);
document.getElementById('prev-page').addEventListener('click', prevPage);
document.getElementById('close-book').addEventListener('click', closeBook);
document.addEventListener('keydown', function(e){
  if(document.getElementById('book-screen').classList.contains('hidden')) return;
  if(e.key === 'ArrowRight') nextPage();
  if(e.key === 'ArrowLeft') prevPage();
  if(e.key === 'Escape') closeBook();
});

renderShelf();
</script>
